name: Docs Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docs-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate docs pack
        run: python scripts/check_docs.py
